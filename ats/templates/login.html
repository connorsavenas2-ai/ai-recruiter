<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — {{ company_name }}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f1e3d 0%, #1a3a6e 50%, #0f1e3d 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: white; border-radius: 16px; width: 100%; max-width: 420px;
  box-shadow: 0 25px 60px rgba(0,0,0,.35); overflow: hidden;
}
.card-top {
  background: linear-gradient(135deg, #0f1e3d, #2563eb);
  padding: 36px 36px 28px; text-align: center; color: white;
}
.logo {
  width: 64px; height: 64px; border-radius: 16px; background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 16px; border: 2px solid rgba(255,255,255,.2);
}
.card-top h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.card-top p  { font-size: 14px; color: rgba(255,255,255,.65); }
.card-body   { padding: 32px 36px 36px; }
.form-group  { margin-bottom: 18px; }
label { display: block; font-size: 12px; font-weight: 700; color: #475569;
        text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
input[type=text], input[type=password] {
  width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0;
  border-radius: 8px; font-size: 15px; outline: none; transition: border-color .15s;
  color: #0f172a;
}
input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.remember { display: flex; align-items: center; gap: 8px; margin-bottom: 22px;
            font-size: 13px; color: #64748b; cursor: pointer; }
.remember input { width: auto; }
.btn {
  width: 100%; padding: 13px; background: linear-gradient(135deg, #1d4ed8, #2563eb);
  color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .15s; letter-spacing: .2px;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.35); }
.btn:active { transform: translateY(0); }
.error {
  background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
  padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.footer { text-align: center; padding: 0 36px 24px; font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo">🏢</div>
    <h1>{{ company_name }}</h1>
    <p>Hiring & Internship Dashboard</p>
  </div>
  <div class="card-body">
    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username"
               placeholder="Enter your username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password"
               placeholder="Enter your password" required>
      </div>
      <label class="remember">
        <input type="checkbox" name="remember"> Keep me signed in
      </label>
      <button type="submit" class="btn">Sign In →</button>
    </form>
  </div>
  <div class="footer">{{ company_name }} · Private Business Tool</div>
</div>
</body>
</html>
